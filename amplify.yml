version: 1
frontend:
  phases:
    preBuild:
      commands:
        - aws codeartifact login --tool npm --domain $CODEARTIFACT_DOMAIN --domain-owner $CODEARTIFACT_OWNER --repository $CODEARTIFACT_REPO --region eu-central-1
        - npm ci 
    build:
      commands:

        - echo "DYNAMODB_USER_POOLS_TABLE=$DYNAMODB_USER_POOLS_TABLE" >> .env.production
        - echo "ALLOWED_ORIGINS=$ALLOWED_ORIGINS" >> .env.production
        - echo "AGENT_INVOKE_ROLE_ARN=$AGENT_INVOKE_ROLE_ARN" >> .env.production
        - echo "AGENT_INVOKE_EXTERNAL_ID=$AGENT_INVOKE_EXTERNAL_ID" >> .env.production
        - echo "HARNESS_REGION=$HARNESS_REGION" >> .env.production
        - echo "BEDROCK_MODEL_ID=$BEDROCK_MODEL_ID" >> .env.production
        - echo "HARNESS_ARN=$HARNESS_ARN" >> .env.production
        - echo "HARNESS_ARN_REQ_DEV=$HARNESS_ARN_REQ_DEV" >> .env.production
        - echo "HARNESS_ARN_ORDER=$HARNESS_ARN_ORDER" >> .env.production
        - echo "HARNESS_ARN_REQ_PRIO=$HARNESS_ARN_REQ_PRIO" >> .env.production
        - echo "HARNESS_ARN_REQ_PLAN=$HARNESS_ARN_REQ_PLAN" >> .env.production
        # JWT HTTPS invoke â€” only write when set (empty lines would bake "" into the client bundle).
        - |
          if [ -n "$NEXT_PUBLIC_AGENTCORE_REGION" ]; then
            echo "NEXT_PUBLIC_AGENTCORE_REGION=$NEXT_PUBLIC_AGENTCORE_REGION" >> .env.production
          elif [ -n "$HARNESS_REGION" ]; then
            echo "NEXT_PUBLIC_AGENTCORE_REGION=$HARNESS_REGION" >> .env.production
          else
            echo "NEXT_PUBLIC_AGENTCORE_REGION=eu-north-1" >> .env.production
          fi
        - |
          if [ -n "$NEXT_PUBLIC_AGENTCORE_QUALIFIER" ]; then
            echo "NEXT_PUBLIC_AGENTCORE_QUALIFIER=$NEXT_PUBLIC_AGENTCORE_QUALIFIER" >> .env.production
          else
            echo "NEXT_PUBLIC_AGENTCORE_QUALIFIER=DEFAULT" >> .env.production
          fi
        - |
          if [ -n "$NEXT_PUBLIC_HARNESS_ARN" ]; then
            echo "NEXT_PUBLIC_HARNESS_ARN=$NEXT_PUBLIC_HARNESS_ARN" >> .env.production
            echo "JWT build: NEXT_PUBLIC_HARNESS_ARN is set (len=${#NEXT_PUBLIC_HARNESS_ARN})"
          else
            echo "WARNING: NEXT_PUBLIC_HARNESS_ARN is empty at build â€” General will use /api/chat"
          fi
        - |
          if [ -n "$NEXT_PUBLIC_HARNESS_ARN_ORDER" ]; then
            echo "NEXT_PUBLIC_HARNESS_ARN_ORDER=$NEXT_PUBLIC_HARNESS_ARN_ORDER" >> .env.production
            echo "JWT build: NEXT_PUBLIC_HARNESS_ARN_ORDER is set (len=${#NEXT_PUBLIC_HARNESS_ARN_ORDER})"
          else
            echo "WARNING: NEXT_PUBLIC_HARNESS_ARN_ORDER is empty at build â€” Order will use /api/chat"
          fi

        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
