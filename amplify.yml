version: 1
frontend:
  phases:
    preBuild:
      commands:
        - aws codeartifact login --tool npm --domain $CODEARTIFACT_DOMAIN --domain-owner $CODEARTIFACT_OWNER --repository $CODEARTIFACT_REPO --region eu-central-1
        - npm ci 
    build:
      commands:

        - echo "DYNAMODB_USER_POOLS_TABLE=$DYNAMODB_USER_POOLS_TABLE" >> .env.production
        - echo "ALLOWED_ORIGINS=$ALLOWED_ORIGINS" >> .env.production
        - echo "AGENT_INVOKE_ROLE_ARN=$AGENT_INVOKE_ROLE_ARN" >> .env.production
        - echo "AGENT_INVOKE_EXTERNAL_ID=$AGENT_INVOKE_EXTERNAL_ID" >> .env.production
        - echo "HARNESS_REGION=$HARNESS_REGION" >> .env.production
        - echo "BEDROCK_MODEL_ID=$BEDROCK_MODEL_ID" >> .env.production
        - echo "HARNESS_ARN=$HARNESS_ARN" >> .env.production
        - echo "HARNESS_ARN_REQ_DEV=$HARNESS_ARN_REQ_DEV" >> .env.production
        - echo "HARNESS_ARN_ORDER=$HARNESS_ARN_ORDER" >> .env.production
        - echo "HARNESS_ARN_REQ_PRIO=$HARNESS_ARN_REQ_PRIO" >> .env.production
        - echo "HARNESS_ARN_REQ_PLAN=$HARNESS_ARN_REQ_PLAN" >> .env.production
        # JWT HTTPS (general + order). Prefer Amplify Console NEXT_PUBLIC_*; fall back to known runtime ARNs
        # so an empty echo never clobbers the client bundle (Amplify shell sometimes lacks NEXT_PUBLIC_*).
        - |
          REGION="${NEXT_PUBLIC_AGENTCORE_REGION:-${HARNESS_REGION:-eu-north-1}}"
          echo "NEXT_PUBLIC_AGENTCORE_REGION=$REGION" >> .env.production
          echo "NEXT_PUBLIC_AGENTCORE_QUALIFIER=${NEXT_PUBLIC_AGENTCORE_QUALIFIER:-DEFAULT}" >> .env.production
          GENERAL_ARN="${NEXT_PUBLIC_HARNESS_ARN:-arn:aws:bedrock-agentcore:eu-north-1:145928770924:runtime/harness_harness_cegecom_general-opDo2y9ttr}"
          ORDER_ARN="${NEXT_PUBLIC_HARNESS_ARN_ORDER:-arn:aws:bedrock-agentcore:eu-north-1:145928770924:runtime/harness_order-GbhPA34Eix}"
          echo "NEXT_PUBLIC_HARNESS_ARN=$GENERAL_ARN" >> .env.production
          echo "NEXT_PUBLIC_HARNESS_ARN_ORDER=$ORDER_ARN" >> .env.production
          echo "JWT build: GENERAL_ARN len=${#GENERAL_ARN} ORDER_ARN len=${#ORDER_ARN}"

        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
